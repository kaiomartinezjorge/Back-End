<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ativos patrimoniais | estoque senai</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
	<div th:replace="~{fragments/header :: header}"></div>

	<main class="pagina">
		<section class="secao">
			<div class="container">
				<div th:replace="~{fragments/mensagens :: mensagens}"></div>

				<div class="titulo-secao">
					<div>
						<h1>ativos patrimoniais</h1>
						<p>Controle os bens da unidade escolar com numero patrimonial, localizacao e status.</p>
					</div>
					<a class="botao" th:href="@{/ativos/novo}">novo ativo</a>
				</div>

				<div class="tabela-area">
					<table class="tabela">
						<thead>
							<tr>
								<th>numero patrimonial</th>
								<th>nome</th>
								<th>categoria</th>
								<th>localizacao</th>
								<th>status</th>
								<th>acoes</th>
							</tr>
						</thead>
						<tbody>
							<tr th:if="${#lists.isEmpty(ativos)}">
								<td colspan="6">Nenhum ativo patrimonial cadastrado.</td>
							</tr>
							<tr th:each="ativo : ${ativos}">
								<td th:text="${ativo.numeroPatrimonio}">PAT-000</td>
								<td th:text="${ativo.nome}">nome</td>
								<td th:text="${ativo.categoria.nome}">categoria</td>
								<td th:text="${ativo.localizacao}">localizacao</td>
								<td th:text="${ativo.status}">status</td>
								<td class="acoes-tabela">
									<a class="botao-link" th:href="@{/ativos/editar/{id}(id=${ativo.id})}">editar</a>
									<form th:action="@{/ativos/excluir/{id}(id=${ativo.id})}" method="post">
										<button class="botao-link botao-link-perigo" type="submit">excluir</button>
									</form>
								</td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>
		</section>
	</main>

	<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
