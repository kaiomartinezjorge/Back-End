<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>formulario categoria | estoque senai</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
	<div th:replace="~{fragments/header :: header}"></div>

	<main class="pagina pagina-centralizada">
		<section class="card-formulario">
			<h1 th:text="${titulo}">categoria</h1>
			<div class="alerta erro" th:if="${#fields.hasGlobalErrors()}" th:each="erro : ${#fields.globalErrors()}" th:text="${erro}">
				mensagem de erro
			</div>

			<form th:action="${acao}" th:object="${categoria}" method="post" class="formulario">
				<div class="campo">
					<label for="nome">nome</label>
					<input id="nome" type="text" th:field="*{nome}" placeholder="nome da categoria">
					<small th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></small>
				</div>

				<div class="campo">
					<label for="descricao">descricao</label>
					<textarea id="descricao" th:field="*{descricao}" rows="4" placeholder="descreva a categoria"></textarea>
					<small th:if="${#fields.hasErrors('descricao')}" th:errors="*{descricao}"></small>
				</div>

				<div class="acoes">
					<button class="botao" type="submit">salvar</button>
					<a class="botao secundario" th:href="@{/categorias}">voltar</a>
				</div>
			</form>
		</section>
	</main>

	<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
