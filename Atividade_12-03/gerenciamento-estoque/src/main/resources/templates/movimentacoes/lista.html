<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>movimentacoes | estoque senai</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
	<div th:replace="~{fragments/header :: header}"></div>

	<main class="pagina">
		<section class="secao">
			<div class="container">
				<div th:replace="~{fragments/mensagens :: mensagens}"></div>

				<div class="titulo-secao">
					<div>
						<h1>movimentacoes</h1>
						<p>Registre entradas e saidas para manter o estoque atualizado.</p>
					</div>
					<a class="botao" th:href="@{/movimentacoes/nova}">nova movimentacao</a>
				</div>

				<div class="tabela-area">
					<table class="tabela">
						<thead>
							<tr>
								<th>material</th>
								<th>tipo</th>
								<th>quantidade</th>
								<th>funcionario</th>
								<th>observacao</th>
								<th>data</th>
							</tr>
						</thead>
						<tbody>
							<tr th:if="${#lists.isEmpty(movimentacoes)}">
								<td colspan="6">Nenhuma movimentacao registrada.</td>
							</tr>
							<tr th:each="movimentacao : ${movimentacoes}">
								<td th:text="${movimentacao.material.nome}">material</td>
								<td>
									<span class="tag"
										th:classappend="${movimentacao.tipo.name() == 'ENTRADA'} ? 'tag-entrada' : 'tag-saida'"
										th:text="${movimentacao.tipo}">ENTRADA</span>
								</td>
								<td th:text="${movimentacao.quantidade}">0</td>
								<td th:text="${movimentacao.funcionario.nome}">funcionario</td>
								<td th:text="${movimentacao.observacao} ?: 'sem observacao'">observacao</td>
								<td th:text="${#temporals.format(movimentacao.data, 'dd/MM/yyyy HH:mm')}">00/00/0000</td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>
		</section>
	</main>

	<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
