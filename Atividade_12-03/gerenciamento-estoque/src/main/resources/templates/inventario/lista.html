<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>inventario | estoque senai</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
	<div th:replace="~{fragments/header :: header}"></div>

	<main class="pagina">
		<section class="secao">
			<div class="container">
				<div class="titulo-secao">
					<div>
						<h1>inventario completo</h1>
						<p>Visualizacao geral de materiais em estoque e ativos patrimoniais cadastrados.</p>
					</div>
				</div>

				<div class="layout-duplo">
					<section class="painel">
						<h2>materiais</h2>
						<table class="tabela">
							<thead>
								<tr>
									<th>nome</th>
									<th>categoria</th>
									<th>quantidade</th>
								</tr>
							</thead>
							<tbody>
								<tr th:if="${#lists.isEmpty(materiais)}">
									<td colspan="3">Nenhum material encontrado.</td>
								</tr>
								<tr th:each="material : ${materiais}">
									<td th:text="${material.nome}">nome</td>
									<td th:text="${material.categoria.nome}">categoria</td>
									<td th:text="${material.quantidade}">0</td>
								</tr>
							</tbody>
						</table>
					</section>

					<section class="painel">
						<h2>ativos patrimoniais</h2>
						<table class="tabela">
							<thead>
								<tr>
									<th>numero</th>
									<th>nome</th>
									<th>status</th>
								</tr>
							</thead>
							<tbody>
								<tr th:if="${#lists.isEmpty(ativos)}">
									<td colspan="3">Nenhum ativo encontrado.</td>
								</tr>
								<tr th:each="ativo : ${ativos}">
									<td th:text="${ativo.numeroPatrimonio}">PAT-000</td>
									<td th:text="${ativo.nome}">nome</td>
									<td th:text="${ativo.status}">status</td>
								</tr>
							</tbody>
						</table>
					</section>
				</div>
			</div>
		</section>
	</main>

	<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
