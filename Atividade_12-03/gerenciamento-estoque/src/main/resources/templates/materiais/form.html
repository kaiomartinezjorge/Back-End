<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>formulario material | estoque senai</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
	<div th:replace="~{fragments/header :: header}"></div>

	<main class="pagina pagina-centralizada">
		<section class="card-formulario">
			<h1 th:text="${titulo}">material</h1>
			<div class="alerta erro" th:if="${#fields.hasGlobalErrors()}" th:each="erro : ${#fields.globalErrors()}" th:text="${erro}">
				mensagem de erro
			</div>

			<form th:action="${acao}" th:object="${material}" method="post" class="formulario">
				<div class="campo">
					<label for="nome">nome</label>
					<input id="nome" type="text" th:field="*{nome}" placeholder="nome do material">
					<small th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></small>
				</div>

				<div class="campo">
					<label for="descricao">descricao</label>
					<textarea id="descricao" th:field="*{descricao}" rows="4" placeholder="descreva o material"></textarea>
					<small th:if="${#fields.hasErrors('descricao')}" th:errors="*{descricao}"></small>
				</div>

				<div class="campo">
					<label for="categoriaId">categoria</label>
					<select id="categoriaId" th:field="*{categoriaId}">
						<option value="">selecione</option>
						<option th:each="categoria : ${categorias}" th:value="${categoria.id}" th:text="${categoria.nome}">categoria</option>
					</select>
					<small th:if="${#fields.hasErrors('categoriaId')}" th:errors="*{categoriaId}"></small>
				</div>

				<div class="campo destaque-campo">
					<label>quantidade atual</label>
					<input type="text" th:value="${quantidadeAtual}" readonly>
				</div>

				<div class="acoes">
					<button class="botao" type="submit">salvar</button>
					<a class="botao secundario" th:href="@{/materiais}">voltar</a>
				</div>
			</form>
		</section>
	</main>

	<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
